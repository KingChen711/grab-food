# ─────────────────────────────────────────────────────────────────────────────
# Infrastructure-only Compose — PostgreSQL, MongoDB, Redis, RabbitMQ,
#                                Elasticsearch, MinIO, Kafka, ZooKeeper
# Usage: docker compose -f infrastructure/docker/docker-compose.infra.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

name: grab-infra

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: grab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grab_password}
      POSTGRES_DB: ${POSTGRES_DB:-grab_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grab_user} -d ${POSTGRES_DB:-grab_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - grab-net
    logging: *default-logging

  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: grab-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-grab_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-grab_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-grab_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - grab-net
    logging: *default-logging

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: grab-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60 1000"
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - grab-net
    logging: *default-logging

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: grab-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-grab_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-grab_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-grab}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - grab-net
    logging: *default-logging

  # ─── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: grab-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=grab-cluster
      - node.name=grab-es-node
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - grab-net
    logging: *default-logging

  # ─── Kibana (ES GUI) ─────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: grab-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_PASSWORD:-kibana_pass}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - grab-net
    logging: *default-logging
    profiles:
      - kibana

  # ─── MinIO (S3-compatible Object Storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: grab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - grab-net
    logging: *default-logging

  # MinIO bucket initializer
  minio-init:
    image: minio/mc:latest
    container_name: grab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-grab-media};
      mc mb --ignore-existing local/grab-invoices;
      mc mb --ignore-existing local/grab-exports;
      mc policy set public local/${MINIO_BUCKET:-grab-media};
      exit 0;
      "
    networks:
      - grab-net

  # ─── ZooKeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: grab-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - grab-net
    logging: *default-logging

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: grab-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - grab-net
    logging: *default-logging

  # ─── Kafka UI ────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: grab-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: grab-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    networks:
      - grab-net
    profiles:
      - kafka-ui

  # ─── Kafka topic initializer ─────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.9.0
    container_name: grab-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order.commands --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic restaurant.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic delivery.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.events --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic analytics.events --partitions 6 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic search.indexing --partitions 3 --replication-factor 1;
      echo 'Kafka topics created successfully';
      "
    networks:
      - grab-net

  # ─── ClickHouse (Analytics OLAP) ─────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: grab-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-grab_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-grab_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-grab_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9009}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - grab-net
    logging: *default-logging

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: grab_postgres_data
  mongodb_data:
    name: grab_mongodb_data
  mongodb_config:
    name: grab_mongodb_config
  redis_data:
    name: grab_redis_data
  rabbitmq_data:
    name: grab_rabbitmq_data
  elasticsearch_data:
    name: grab_elasticsearch_data
  minio_data:
    name: grab_minio_data
  zookeeper_data:
    name: grab_zookeeper_data
  zookeeper_log:
    name: grab_zookeeper_log
  kafka_data:
    name: grab_kafka_data
  clickhouse_data:
    name: grab_clickhouse_data

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  grab-net:
    name: grab-network
    driver: bridge
