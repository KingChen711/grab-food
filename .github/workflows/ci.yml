# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Lint, Test, Build, Docker
# Runs on every push / PR to main and develop
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ─── Detect changed packages for selective CI ──────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      services: ${{ steps.filter.outputs.services }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
            services:
              - 'services/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            infra:
              - 'infrastructure/**'
              - 'services/*/Dockerfile'
              - 'docker-compose*.yml'

  # ─── Install dependencies (shared cache) ───────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ─── Lint & Format Check ───────────────────────────────────────────────────
  lint:
    name: Lint & Format
    needs: [setup, changes]
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: ESLint
        run: pnpm turbo lint

      - name: Prettier check
        run: pnpm format:check

      - name: TypeScript type check
        run: pnpm turbo typecheck

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    needs: [setup, changes]
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run tests
        run: pnpm turbo test -- --ci --coverage --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/*/coverage
            packages/*/coverage
          retention-days: 7

  # ─── Build all packages & services ─────────────────────────────────────────
  build:
    name: Build
    needs: [setup, changes]
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all
        run: pnpm turbo build

  # ─── Docker build (validate Dockerfiles compile) ───────────────────────────
  docker:
    name: Docker Build — ${{ matrix.service }}
    needs: [build, changes]
    if: >-
      github.event_name == 'push' &&
      (needs.changes.outputs.services == 'true' || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - restaurant-service
          - order-service
          - delivery-service
          - payment-service
          - notification-service
          - search-service
          - analytics-service
          - promotion-service
          - media-service
          - recommendation-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: grab/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── CI Status Gate (for branch protection rules) ──────────────────────────
  ci-ok:
    name: CI Status
    if: always()
    needs: [lint, test, build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.docker.result }}" == "failure" ]]; then
            echo "::error::CI failed"
            exit 1
          fi
          echo "All CI checks passed"
